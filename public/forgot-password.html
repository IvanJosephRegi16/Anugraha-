<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Anugraha Kirloskar CRM</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        body {
            background: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid #eee;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-header h1 {
            color: #1f7a1f;
            font-size: 22px;
            font-weight: 700;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-info {
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Enter your phone to receive an OTP.</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label>Registered Phone Number</label>
                <input type="text" id="phone" placeholder="9876543210" maxlength="10" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;" id="sendBtn">Send OTP</button>
        </form>

        <div style="margin-top: 20px; text-align: center; font-size: 14px;">
            <a href="login.html" style="color: #666; text-decoration: none;">← Back to Login</a>
        </div>

        <!-- OTP Display for Dev -->
        <div id="devOtpBox"
            style="margin-top:20px; padding:15px; background:#f0f7f0; border:1px dashed #1f7a1f; border-radius:8px; display:none; text-align:center;">
            <p style="font-size:12px; color:#1f7a1f; margin-bottom:5px;">Development Mode OTP:</p>
            <h2 id="devOtp" style="color:#1f7a1f; letter-spacing:5px;">------</h2>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sendBtn = document.getElementById('sendBtn');
            const alertBox = document.getElementById('alertBox');
            const phone = document.getElementById('phone').value;

            sendBtn.disabled = true;
            sendBtn.innerText = 'Sending...';

            const response = await apiCall('/api/forgot-password', { phone });

            if (response.success) {
                alertBox.className = 'alert alert-info';
                alertBox.innerText = 'OTP generated! Redirecting...';
                alertBox.style.display = 'block';

                // Show OTP on screen for developer ease
                document.getElementById('devOtpBox').style.display = 'block';
                document.getElementById('devOtp').innerText = response.otp;

                setTimeout(() => {
                    localStorage.setItem('resetPhone', phone);
                    window.location.href = 'verify-otp.html';
                }, 3000);
            } else {
                alertBox.className = 'alert alert-error';
                alertBox.innerText = response.message;
                alertBox.style.display = 'block';
                sendBtn.disabled = false;
                sendBtn.innerText = 'Send OTP';
            }
        });

        // We need to add the forgot-password logic back to auth.js or routes/auth.js
        // I noticed I didn't include it in the previous routes/auth.js update.
    </script>
</body>

</html>
